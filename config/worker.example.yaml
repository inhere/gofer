# gofer ws-worker example configuration.
# Run with:  gofer worker -c worker.yaml   (the worker config has NO auto-discovery
# chain — the path is always explicit). Generate this starter with:
#   gofer init worker            # writes ./worker.yaml
#
# A worker is a SEPARATE process that dials the server's hub over WebSocket,
# registers, and runs dispatched jobs LOCALLY with its own config (it re-validates
# project/agent/exec against THIS file). See the server example's `server.workers`
# + `runners` comments for the connect-side requirements.
#
# PROJECT SOURCING — two modes (the worker picks one by what THIS file contains):
#   * POLICY (recommended): declare `roots:` below. The SERVER pushes the set of
#     projects this worker may run; the worker maps each server-side path onto a
#     local root and runs it. Add/point a project server-side with NO worker edit.
#   * LEGACY (deprecated): declare `projects:` (and NO roots). The worker sources
#     projects from THIS file and ignores any pushed policy. Still works; migrate
#     to roots — see docs/runbook/2026-07-15-worker-policy-migration.md.
# roots present ⇒ POLICY (any leftover `projects:` is ignored, with a warning).
# 配置场景速查(恒等映射 / 跨盘 / Windows / worker 独有 project / 保持 LEGACY 等, 与 OS 无关):
#   skills/gofer-usage/references/worker-config.md  (或安装后的 .claude/skills/gofer-usage/)

# worker_id 必须等于【服务端 server.workers 段的 KEY】(以及 runners.<name>.worker_id)。
# register 帧自报这个 id; 它与所用 token 绑定不一致就会被 hub 拒(日志: "registration
# rejected ... worker_id not bound to this token")。
worker_id: w-host

# server_link: 如何连到服务端 hub。
server_link:
  # 一个或多个 hub 地址(失败时轮换; 可填同一 hub 的多个入口或多个 hub)。
  # 路径固定为 /v1/workers/connect; 地址要与服务端 server.addr 一致。
  urls: [ws://127.0.0.1:LIVE-PORT/v1/workers/connect]
  # 凭证: 优先 token_env(从环境变量读), 避免把 token 写进文件。
  # 解析出的 token 必须等于服务端 server.workers.<worker_id> 的同一个 token。
  token_env: GOFER_WORKER_TOKEN
  # token: "..."          # 内联覆盖(本地测试用; 不要提交真实 token)
  # reconnect: 重连退避 + 心跳(全部 <=0 时取默认)。
  # reconnect:
  #   initial_backoff_ms: 1000
  #   max_backoff_ms: 30000
  #   ping_interval_ms: 15000
  #   read_deadline_ms: 45000

# labels: 展示 + 调度提示(WP4 自动调度按 label 选 worker)。
labels: [host, codex, claude]

# max_concurrent: 本 worker 并发执行的 job 上限。
max_concurrent: 4

# roots(POLICY 模式核心): 把【服务端逻辑路径前缀 from】映射到【本执行机 to】。
# 服务端下发的每个 project 带一个逻辑 host_path; worker 用最长匹配的 root 把它换算成
# 本机真实目录再执行。加一条 root = 【故意】扩大这台机可执行的目录树，因此 roots 只在
# 本机维护(不会被远端改写、也不经 API 暴露)。
#
#   * to 必须是【本执行机上真实存在】的目录; from 是服务端视角的逻辑前缀(可为 Windows
#     盘符形式, 大小写不敏感; POSIX 前缀大小写敏感)。
#   * 匹配按【最长 from 优先】: 因此一条更长的 from 就是「更具体 root 覆盖」——既能改 project
#     根、也一起改其子路径(例外目录本就是另一棵树, 无需 per-project 覆盖)。
#   * 越界保护: 映射结果必须仍落在 to 之下(含 symlink), 否则该 project 被拒(path_outside_roots)。
roots:
  # 通配根: 服务端 D:/work/x 下的所有 project → 本机 /host/projects/x 下同名子目录。
  - from: D:/work/x
    to: /host/projects/x
  # 更具体 root 覆盖(例外): 服务端末段名与本机不同名时, 用更长的 from 精确改写。
  # 命中它的 project(及其子路径)映到 /host/projects/proj-b, 而非通配根的 .../proj-a。
  - from: D:/work/x/proj-a
    to: /host/projects/proj-b

# guards(护栏): 本 worker 对下发能力的【本地收紧】开关。缺省语义 = 【不额外收紧】:
#   * 字段【缺失/未写】= 不收紧(exec 与 interactive 都放行, 与升级前行为一致);
#   * 显式 false 才拒: allow_exec:false 拒所有 exec job; allow_interactive:false 拒所有 pty/交互 job。
# 迁移到 policy 模式时【建议显式声明】(别靠缺省), 让这台机的能力姿态一目了然(doctor 会 WARN)。
guards:
  allow_exec: true
  allow_interactive: false

# projects(【已废弃 / LEGACY】): 仅当【没有 roots】时生效 —— 此时 worker 用【自己的】这份
# 项目配置执行 job(派发端校验一次, 派到 worker 后用本文件再解析【同一个 key】, 对不上以「未知
# 项目」拒掉)。有了上面的 roots 就【无需本段】(留着也会被忽略并告警)。保留示例仅供参考:
# projects:
#   w-host:
#     host_path: /host/projects/x/w-host   # 本执行机上的真实工作目录
#     default_agent: exec
#     allowed_agents: [exec]
#     allowed_runners: [local]             # worker 本地用 local runner 真正执行
#     allow_exec: true

# agents: 若要跑 cli-agent(codex/claude/…), 在这里定义其命令(worker 本地需装这些 CLI)。
# 纯 exec job 不需要本段。结构同服务端 example 的 agents。
# claude 的 --output-format stream-json --verbose 让输出实时流式(长任务/超时也有
# 进度),代价是日志为 NDJSON 事件(最终文本在 result 事件);去掉两个 flag 即纯文本。
# agents:
#   claude:
#     type: cli-agent
#     command: claude
#     args: ["-p", "--output-format", "stream-json", "--verbose", "{{prompt}}"]

# storage: 本 worker 的结果/日志落盘配置(同服务端 example 的 storage)。
# db: 无需手设 root —— worker 元数据库默认按 worker_id 落到
#     <config-dir>/worker/<worker_id>.db，不会与 serve 的 <config-dir>/gofer.db 或其它
#     worker 撞库(config.ResolveWorkerDBPath)。仅在要自定义时设 db_path(显式优先) 或
#     root(则 db=<root>/<worker_id>.db)；注意 root 同时改"结果落盘根"，别指到 git 跟踪
#     的目录(结果文件非 *.db、会被跟踪)。
storage:
  default_exchange_subdir: tmp
  default_result_subdir: gofer

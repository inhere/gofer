# gofer example configuration.
# 推荐: 单机只起一个 server, 把这份配置放全局 ~/.config/gofer/config.yaml
#   gofer init server --global   # 直接写到全局并打印 GOFER_CONFIG 提示
# 然后 export GOFER_CONFIG=~/.config/gofer/config.yaml, 任意目录命令都走全局单文件。
# 项目专属偏好(result_subdir/default_agent 等)放项目目录 .gofer.project.yaml
# (瘦配置, 后续阶段落地; 准入字段 allowed_agents/allowed_runners 仍留在本全局文件)。
#
# Copy to one of the lookup locations (§6.1), or run `gofer init` to drop this
# starter at ./.gofer.yaml, then edit and run `gofer config validate`:
#   1. --config <path>
#   2. env GOFER_CONFIG
#   3. ./.gofer[.local].yaml
#   4. ~/.config/gofer/config.yaml

server:
  # Listen address. Default 0.0.0.0:8765 so a container can reach the host via
  # host.docker.internal; security relies on a mandatory token + internal access.
  addr: 0.0.0.0:8765
  # Prefer reading the bearer token from an env var rather than inlining it.
  token_env: GOFER_TOKEN
  # token: ""              # inline override (avoid committing real tokens)
  # Must be explicitly true to start without any token.
  allow_empty_token: false
  # web_enabled: true      # unset defaults to true; set false to drop the web console.
  # path_view: host         # E29/D10: gofer-process execution view. host (default)
  #                         # => use project host_path; container => use container_path
  #                         # (falls back to host_path if unset). Explicit operator
  #                         # switch — gofer does NOT self-detect a container.

  # callers: multi-caller auth (C2). Each entry maps a bearer token to a caller
  # id stamped onto submitted jobs (audit / per-caller filtering). The legacy
  # single token above stays valid (treated as caller id "default"); revoke a
  # caller by removing its entry and reloading. Prefer token_env over inline token.
  #
  # E17 per-caller 配额/限流(可选,缺省=回退 governance 默认,再缺省=不限):
  #   max_concurrent_jobs  该 caller 同时在跑上限(信号量排队,超额不拒,排队等槽)
  #   rate_limit           每秒提交请求数(令牌桶速率, 仅限 POST /v1/jobs|/v1/workflows)
  #   rate_burst           桶容量(突发); 省略/<=0 时取 max(1, ceil(rate_limit))
  # 超并发 → 排队(queued); 超速率 → 429 + Retry-After。改 rate_* 后 SIGHUP 即时生效。
  # callers:
  #   - id: ci-bot
  #     token_env: GOFER_TOKEN_CI
  #     max_concurrent_jobs: 8       # 覆盖 governance.default_caller_max_concurrent
  #     rate_limit: 20               # 覆盖 governance.default_rate_limit
  #     rate_burst: 40               # 覆盖 governance.default_rate_burst
  #   - id: ops
  #     token_env: GOFER_CALLER_OPS_TOKEN

  # workers: per-worker auth/binding for ws-worker (§7). The map key is the
  # worker_id; a `register` frame whose worker_id does not match the presented
  # token's bound worker is rejected. The per-worker token is mandatory even when
  # allow_empty_token is set. labels are display/scheduling hints only.
  #
  # 让一个 worker 真正连上并显示,三处必须对齐【同一个 worker_id】(下例 builder-1):
  #   1. server.workers 的 KEY            = builder-1   (本段)
  #   2. worker 端 config 的 worker_id     = builder-1   (worker 的 *.yaml,见 worker 配置)
  #   3. runners.<name>.worker_id          = builder-1   (下面 runners 段,给名册/派发用)
  # 且 worker 端 server_link.token 必须解析为 server.workers.builder-1 的同一个 token。
  # 缺 server.workers 段 → worker 注册被拒(日志: "hub rejected worker registration ...
  # worker_id not bound to this token"); 缺 runners 段 → 连上了但 /v1/runners(Web)看不到。
  # workers:
  #   builder-1:
  #     token_env: GOFER_WORKER_BUILDER1_TOKEN
  #     labels: [linux, gpu]

  # runner_probe: peer-http active health-probe tuning (C6). Defaults when unset
  # or <= 0: 30s interval, 5s per-probe timeout. Only runs when at least one
  # peer-http runner is configured.
  # runner_probe:
  #   interval_seconds: 30
  #   timeout_seconds: 5

  # metrics: E16 Prometheus /metrics scrape endpoint (design §6.2). Mounted as a
  # sibling of /health, OUTSIDE the /v1 auth group: scrapers rarely carry a Bearer
  # token, so internal access control is the primary guard (SR202). The whole block
  # is optional — unset keeps the endpoint enabled and unauthenticated.
  metrics:
    enabled: true                  # unset/true=mount /metrics; false=drop it
    token: ""                      # 空=免认证抓取；非空=要求 Authorization: Bearer <token>

  # governance: E17 per-caller 配额/限流的【全局兜底】(caller 未单配时生效)。整段缺省
  # 或全 0 = 不限(向后兼容)。每个 caller 可在 callers[] 里用同名字段覆盖(见上)。
  #   default_caller_max_concurrent  caller 默认同时在跑上限(信号量排队,超额不拒)
  #   default_rate_limit             caller 默认每秒提交速率(令牌桶; 仅限提交类写入端点)
  #   default_rate_burst             caller 默认桶容量(突发); <=0 时取 max(1, ceil(rate))
  # governance:
  #   default_caller_max_concurrent: 4
  #   default_rate_limit: 5          # 每秒 5 次提交
  #   default_rate_burst: 10

  # notification: E14 webhook 外发。关键事件(默认 job.terminal + interaction.created)
  # 触发，向每个订阅 webhook 主动 POST(durable 投递 + 退避重试 30s→2m→5m→15m→60m)。
  # 安全(最大对外出站面)：URL 出站白名单(allow_hosts) + 仅 https + 拒 loopback/内网
  # (SSRF) + HMAC(secret_env,密钥不入库不入日志)。整段缺省=不启用(投递 sweeper 不启动)。
  # notification:
  #   webhooks:
  #     - url: https://hooks.example.com/gofer       # 出站目标(必须过 allow_hosts + 公网)
  #       events: [job.terminal, interaction.created] # 订阅事件(省略=默认集)
  #       secret_env: GOFER_WEBHOOK_SECRET            # HMAC 密钥的 env 名(不入库)
  #       projects: [my-project1]                     # 仅这些项目(省略=全部)
  #   allow_hosts: [hooks.example.com]                # 出站 host 白名单(空=全部拒绝)
  #   allow_http: false                               # 默认仅 https; true 仅本地测试用
  #   max_attempts: 6                                 # 重试上限(默认 6=退避表 5 步+首次)

storage:
  # Per-project data exchange subdir (default: tmp).
  default_exchange_subdir: tmp
  # Per-project result subdir under the exchange dir (default: gofer).
  default_result_subdir: gofer
  # Optional global store root. Leave empty to keep results under each project's
  # exchange dir. When set, results go to <root>/<project_key>/<job_id> and the
  # container can only read them back over HTTP (not via the shared mount).
  # root: /var/lib/gofer
  # db_path: explicit path to the SQLite metadata DB. When empty it resolves to
  # <root>/gofer.db (if root set) else <config-dir>/gofer.db (~/.config/gofer).
  # db_path: /var/lib/gofer/gofer.db

  # retention: bound how many terminal jobs (and their logs) are kept; the serve
  # prune loop enforces it. Unset (all <= 0) disables prune entirely. Set
  # max_age_days and/or max_count to enable; prune_interval_minutes defaults 60.
  # retention:
  #   max_age_days: 14
  #   max_count: 5000
  #   prune_interval_minutes: 60

projects:
  # First project: the workspace root.
  my-project1:
    host_path: D:/work/inhere/my-project1
    container_path: /d/work/inhere/my-project1
    exchange_subdir: tmp
    result_subdir: gofer
    default_agent: codex
    allowed_agents: [codex, claude, exec]
    # allowed_runners 列的是 runner 的【名字】(runners: 下的 key),不是 type。
    # 要把 job 派给 worker, 在这里加上那个 worker-runner 的名字(如下例 builder):
    #   allowed_runners: [local, builder]
    # 注意 worker 是【两段配置】:
    #   - 派发端(本 server 项目)allowed_runners 含 worker-runner 名(builder) → 准许派发;
    #   - 执行端(worker 自己的 *.yaml 同名项目)allowed_runners 含 local → worker 本地执行;
    #   - 且【project key 两边必须一致】: job 带的 project, 派到 worker 后由 worker 用自己的
    #     config 再解析同一个 key, key 对不上 worker 会以「未知项目」拒掉。
    allowed_runners: [local]
    allow_exec: true
    max_concurrent_jobs: 4
    # capture_diff toggles git-diff capture on job outcomes (E12). Unset defaults
    # to "on when cwd is a git work tree"; set false to disable outright.
    # capture_diff: true
  # Second project: 瘦写法 — 只写 host_path/container_path + 准入 allowed_agents,
  # 其余(exchange_subdir/result_subdir/default_agent/max_concurrent_jobs 等)留空走默认。
  my-tools:
    host_path: D:/work/inhere/path-to/my-tools
    container_path: /d/work/inhere/path-to/my-tools
    allowed_agents: [exec]

agents:
  # Template placeholders supported in `args`: {{prompt}} {{cwd}} {{job_id}}
  # {{result_dir}}. Each arg element is substituted independently and the argv
  # array is preserved — {{prompt}} stays ONE argv element, so a prompt with
  # spaces/quotes is never re-tokenised by a shell (no shell is used).

  # codex: non-interactive run via `codex exec "<prompt>"`.
  codex:
    type: cli-agent
    command: codex
    args: [exec, "{{prompt}}"]
    detect:
      command: codex
      args: [--version]
  # claude: Claude Code CLI; `-p` (print) runs non-interactively and prints the
  # result. Adjust the flag to your installed CLI if it differs.
  claude:
    type: cli-agent
    command: claude
    args: ["-p", "{{prompt}}"]
    detect:
      command: claude
      args: [--version]
  # opencode: non-interactive run; `run <prompt>` per the opencode CLI.
  # Adjust to your installed CLI if it differs.
  opencode:
    type: cli-agent
    command: opencode
    args: [run, "{{prompt}}"]
    detect:
      command: opencode
      args: [--version]
  # exec is a built-in agent (Registry.Get("exec") works without this block).
  # It is listed here only to document the type and to give it a detect probe.
  # It runs the request-supplied argv verbatim; it ignores prompt/templates.
  exec:
    type: exec
    detect:
      command: sh
      args: [-c, "true"]

runners:
  # local is a built-in runner; declaring it is optional.
  local:
    type: local
  # Reverse-call a peer bridge running inside a container (P7).
  docker-peer:
    type: peer-http
    base_url: http://127.0.0.1:8766
    token_env: CONTAINER_BRIDGE_TOKEN
  # Dispatch to a registered ws-worker. 声明这个 runner 才会:① 让 worker 出现在
  # /v1/runners 名册(Web 可见); ② 可被 `runner: <这个 runner 名>` 的 job 派发到。
  # worker_id 必须等于上面 server.workers 的 KEY(也=worker 端自报的 worker_id)。
  # 一个 worker-runner 精确指向一个 worker(动态路由是 WP4 调度, 非 WP1)。
  # 提交端项目还需在 allowed_runners 里加上这个 runner 名(见 projects 段注释)。
  # builder:
  #   type: worker
  #   worker_id: builder-1
